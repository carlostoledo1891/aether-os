name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Guard lockfile sync on PRs
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          pkg_changed="$(git diff --name-only "$base_sha" "$head_sha" -- package.json || true)"
          lock_changed="$(git diff --name-only "$base_sha" "$head_sha" -- package-lock.json || true)"
          server_pkg_changed="$(git diff --name-only "$base_sha" "$head_sha" -- server/package.json || true)"
          server_lock_changed="$(git diff --name-only "$base_sha" "$head_sha" -- server/package-lock.json || true)"
          engine_pkg_changed="$(git diff --name-only "$base_sha" "$head_sha" -- engine/package.json || true)"
          engine_lock_changed="$(git diff --name-only "$base_sha" "$head_sha" -- engine/package-lock.json || true)"

          if [ -n "$pkg_changed" ] && [ -z "$lock_changed" ]; then
            echo "package.json changed but package-lock.json did not."
            echo "Run 'npm install' and commit the updated lockfile."
            exit 1
          fi

          if [ -n "$server_pkg_changed" ] && [ -z "$server_lock_changed" ]; then
            echo "server/package.json changed but server/package-lock.json did not."
            echo "Run 'npm --prefix server install' and commit the updated lockfile."
            exit 1
          fi

          if [ -n "$engine_pkg_changed" ] && [ -z "$engine_lock_changed" ]; then
            echo "engine/package.json changed but engine/package-lock.json did not."
            echo "Run 'npm --prefix engine install' and commit the updated lockfile."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run check:deploy-config
      - run: npm run build
      - name: Server tests
        run: |
          cd server && npm ci && npm test
      - name: Engine tests
        run: |
          cd engine && npm ci && npm test

  security:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: cd server && npm ci
      - run: cd engine && npm ci

      - name: Dependency audit (root)
        run: npm audit --audit-level=high || true
      - name: Dependency audit (server)
        run: cd server && npm audit --audit-level=high || true
      - name: Dependency audit (engine)
        run: cd engine && npm audit --audit-level=high || true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate SBOM (root)
        run: syft dir:. -o cyclonedx-json=sbom-root.cdx.json
      - name: Generate SBOM (server)
        run: syft dir:server -o cyclonedx-json=sbom-server.cdx.json
      - name: Generate SBOM (engine)
        run: syft dir:engine -o cyclonedx-json=sbom-engine.cdx.json

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4
      - name: Vulnerability scan (root)
        run: grype sbom:sbom-root.cdx.json --fail-on critical || true
      - name: Vulnerability scan (server)
        run: grype sbom:sbom-server.cdx.json --fail-on critical || true
      - name: Vulnerability scan (engine)
        run: grype sbom:sbom-engine.cdx.json --fail-on critical || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-root.cdx.json
            sbom-server.cdx.json
            sbom-engine.cdx.json
          retention-days: 90

  deployment-parity:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run deployment parity smoke (optional)
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          EXPECTED_API_BASE_URL: ${{ secrets.EXPECTED_API_BASE_URL }}
          EXPECTED_WS_URL: ${{ secrets.EXPECTED_WS_URL }}
          FORBIDDEN_API_BASE_URL: ${{ secrets.FORBIDDEN_API_BASE_URL }}
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ] || [ -z "$EXPECTED_API_BASE_URL" ]; then
            echo "Skipping deployment parity smoke: required secrets are not configured."
            exit 0
          fi
          npm run test:e2e:deployment
